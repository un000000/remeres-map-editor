name: Reusable Fast Checks

on:
  workflow_call:

permissions:
  contents: read
  checks: write
  pull-requests: read

jobs:
  run-checks:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1.5.0

      - name: Setup dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-17 cppcheck libxml2-utils yamllint

      - name: Run clang-format lint
        uses: DoozyX/clang-format-lint-action@v0.20
        with:
          source: "source"
          extensions: "cpp,hpp,h"
          clangFormatVersion: 17

      - name: Run yamllint
        run: yamllint -c .yamllint.yaml .github

      - name: Run analysis with reviewdog
        if: github.event.pull_request != null && github.event.pull_request.head.repo.full_name == github.repository
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
          REVIEWDOG_REPORTER: github-pr-check
        run: |
          reviewdog -reporter="${REVIEWDOG_REPORTER}" -runners=xmllint -fail-level=error -filter-mode=added
          reviewdog -reporter="${REVIEWDOG_REPORTER}" -runners=cppcheck -filter-mode=added || true

name: Reusable Docker Build

on:
  workflow_call:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Image Build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Convert repository name to lowercase
        id: repo_lower
        shell: bash
        run: echo "value=${REPO,,}" >> "${GITHUB_OUTPUT}"
        env:
          REPO: ${{ github.repository }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (main)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            VCPKG_FEED_URL=https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
            VCPKG_FEED_USERNAME=${{ github.repository_owner }}
            VCPKG_BINARY_CACHE_ACCESS=readwrite
            VCPKG_BINARY_SOURCES=clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,readwrite;nugettimeout,1200
          secrets: |
            github_token=${{ secrets.VCPKG_PACKAGES_TOKEN || github.token }}
          tags: |
            ghcr.io/${{ steps.repo_lower.outputs.value }}:latest
            ghcr.io/${{ steps.repo_lower.outputs.value }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and export (PR)
        if: github.ref != 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          outputs: type=local,dest=artifacts/docker-rootfs
          build-args: |
            VCPKG_FEED_URL=https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
            VCPKG_FEED_USERNAME=${{ github.repository_owner }}
            VCPKG_BINARY_CACHE_ACCESS=read
            VCPKG_BINARY_SOURCES=clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,read;nugettimeout,1200
          tags: |
            ghcr.io/${{ steps.repo_lower.outputs.value }}:pr
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload docker artifact
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: docker-remeres-map-editor
          path: artifacts/docker-rootfs/rme/
          retention-days: 7
